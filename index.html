<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LinkFlow AI — Smart LinkedIn Relationship Manager</title>
<meta name="description" content="LinkFlow AI helps you track, manage, and grow your LinkedIn connections with smart relationship insights."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<link rel="stylesheet" href="fix.css"/>
</head>
<body>
<div id="app">

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="screen active">
    <div class="auth-bg">
      <div class="auth-orb orb-1"></div>
      <div class="auth-orb orb-2"></div>
      <div class="auth-orb orb-3"></div>
    </div>
    <div class="auth-container">
      <div class="auth-logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
            <path d="M4 8C4 5.8 5.8 4 8 4h16c2.2 0 4 1.8 4 4v16c0 2.2-1.8 4-4 4H8c-2.2 0-4-1.8-4-4V8z" fill="url(#g1)"/>
            <path d="M10 12h3v10h-3V12zm1.5-4.5a1.75 1.75 0 110 3.5 1.75 1.75 0 010-3.5zM15 12h3v1.4c.6-.9 1.6-1.6 3-1.6 2.8 0 4 1.8 4 4.4V22h-3v-5.2c0-1.2-.4-2-1.6-2-1.4 0-2.2.9-2.2 2.4V22H15V12z" fill="white"/>
            <defs><linearGradient id="g1" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
          </svg>
        </div>
        <span class="logo-text">LinkFlow <span class="logo-ai">AI</span></span>
      </div>
      <div class="auth-card">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')">Sign In</button>
          <button class="auth-tab" data-tab="signup" onclick="switchAuthTab('signup')">Sign Up</button>
        </div>
        <div id="login-form" class="auth-form active">
          <h1 class="auth-title">Welcome back</h1>
          <p class="auth-subtitle">Continue building meaningful connections</p>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="login-email" class="form-input" placeholder="you@example.com" value="demo@linkflow.ai"/>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="login-password" class="form-input" placeholder="••••••••" value="demo1234"/>
          </div>
          <button class="btn-primary btn-full" onclick="handleLogin()">
            <span>Sign In</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
          <div class="auth-divider"><span>or continue with</span></div>
          <button class="btn-social" onclick="handleLogin()">
            <svg width="18" height="18" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" fill="#0077B5"/></svg>
            <span>Continue with LinkedIn</span>
          </button>
        </div>
        <div id="signup-form" class="auth-form">
          <h1 class="auth-title">Get started free</h1>
          <p class="auth-subtitle">Your smart networking journey begins here</p>
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" id="signup-name" class="form-input" placeholder="Alex Johnson"/>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="signup-email" class="form-input" placeholder="you@example.com"/>
          </div>
          <div class="form-group">
            <label class="form-label">LinkedIn Profile URL</label>
            <input type="url" id="signup-linkedin" class="form-input" placeholder="linkedin.com/in/yourprofile"/>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="signup-password" class="form-input" placeholder="Create a strong password"/>
          </div>
          <button class="btn-primary btn-full" onclick="handleSignup()">
            <span>Create Account</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
      <p class="auth-footer">Smart networking for ambitious professionals 🚀</p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main-app" class="screen">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon sm">
          <svg width="18" height="18" viewBox="0 0 32 32" fill="none">
            <path d="M4 8C4 5.8 5.8 4 8 4h16c2.2 0 4 1.8 4 4v16c0 2.2-1.8 4-4 4H8c-2.2 0-4-1.8-4-4V8z" fill="url(#g2)"/>
            <path d="M10 12h3v10h-3V12zm1.5-4.5a1.75 1.75 0 110 3.5 1.75 1.75 0 010-3.5zM15 12h3v1.4c.6-.9 1.6-1.6 3-1.6 2.8 0 4 1.8 4 4.4V22h-3v-5.2c0-1.2-.4-2-1.6-2-1.4 0-2.2.9-2.2 2.4V22H15V12z" fill="white"/>
            <defs><linearGradient id="g2" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
          </svg>
        </div>
        <span>LinkFlow <strong>AI</strong></span>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span>Dashboard</span>
        </button>
        <button class="nav-item" data-page="daily" onclick="navigate('daily')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>Daily Contacts</span>
          <span class="nav-badge" id="daily-badge">5</span>
        </button>
        <button class="nav-item" data-page="connections" onclick="navigate('connections')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
          <span>Connections</span>
        </button>
        <button class="nav-item" data-page="analytics" onclick="navigate('analytics')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <span>Analytics</span>
        </button>
        <button class="nav-item" data-page="import" onclick="navigate('import')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <span>Import</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <div class="user-card">
          <div class="user-avatar" id="sidebar-avatar">AJ</div>
          <div class="user-info">
            <span class="user-name" id="sidebar-name">Alex Johnson</span>
            <span class="user-plan">Free Plan</span>
          </div>
        </div>
        <button class="btn-logout" onclick="handleLogout()" title="Sign out">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="sidebar-toggle" onclick="toggleSidebar()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div class="page-title-area">
            <h2 id="page-title">Dashboard</h2>
            <span id="page-date" class="page-date"></span>
          </div>
        </div>
        <div class="topbar-right">
          <div class="search-bar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="global-search" placeholder="Search connections..." oninput="handleSearch(this.value)"/>
          </div>
          <div class="notif-btn" onclick="toggleNotifications()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            <span class="notif-dot"></span>
          </div>
        </div>
      </header>

      <div id="notif-panel" class="notif-panel hidden">
        <div class="notif-header">
          <span>Notifications</span>
          <button onclick="toggleNotifications()">✕</button>
        </div>
        <div id="notif-list" class="notif-list"></div>
      </div>

      <div id="page-dashboard" class="page active"></div>
      <div id="page-daily" class="page"></div>
      <div id="page-connections" class="page"></div>
      <div id="page-analytics" class="page"></div>
      <div id="page-import" class="page"></div>
    </main>
  </div>

  <!-- MODAL -->
  <div id="contact-modal" class="modal-overlay hidden" onclick="closeModal(event)">
    <div class="modal-card" id="modal-content"></div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}
</script>
</body>
</html>
